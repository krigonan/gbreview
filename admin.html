<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — GBReview.in</title>
<!-- Noindex: keep this page out of Google -->
<meta name="robots" content="noindex,nofollow"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#1a6ef5;--bg:#fafaf8;--border:#e8e8e5;--text:#111;--text2:#555;--text3:#999;--success:#15803d;--sbg:#f0fdf4;--sbd:#bbf7d0;--danger:#dc2626;--dbg:#fef2f2;--dbd:#fecaca}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.logo span{color:var(--accent)}
.abadge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;letter-spacing:.04em}

.wrap{max-width:820px;margin:0 auto;padding:32px 20px 80px}
h1{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.sub{font-size:14px;color:var(--text2);margin-bottom:26px;line-height:1.6}

/* Auth */
.auth-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px;max-width:420px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:28px}
.auth-card label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.auth-row{display:flex;gap:10px}
.auth-row input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;outline:none;font-family:monospace;color:var(--text);background:#fff;letter-spacing:.05em}
.auth-row input:focus{border-color:var(--accent)}
.auth-row button{padding:10px 20px;border-radius:9px;border:none;background:var(--text);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.auth-row button:hover{background:#333}

/* Messages */
.errmsg{background:var(--dbg);color:var(--danger);border:1px solid var(--dbd);border-radius:9px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none;line-height:1.5}
.okmsg{background:var(--sbg);color:var(--success);border:1px solid var(--sbd);border-radius:9px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none;line-height:1.5}

/* Section header */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-hdr h2{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.cnt-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;background:#f0f0ee;border:1px solid var(--border);color:var(--text2)}

/* Business cards */
.bc{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:border-color .15s}
.bc:hover{border-color:#d0d0cc}
.btop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.bdet{flex:1;min-width:0}
.bname{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.bts{font-size:12px;color:var(--text3);margin-bottom:12px}
.brow{font-size:13px;color:var(--text2);margin-bottom:5px;line-height:1.5}
.brow strong{color:var(--text);font-weight:600}
.msg-box{margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:7px;font-size:12px;color:var(--text2);font-style:italic;line-height:1.5;border:1px solid var(--border)}
.link-pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;padding:4px 12px;border-radius:999px;background:#eff4ff;color:var(--accent);border:1px solid #c0d4fd;font-family:monospace;max-width:100%;word-break:break-all}
.code-tag{font-size:10px;color:var(--text3);margin-top:6px;font-family:monospace}

/* Approve button */
.apbtn{padding:10px 20px;border-radius:9px;border:1.5px solid var(--success);background:var(--sbg);color:var(--success);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .15s;align-self:flex-start;letter-spacing:.01em}
.apbtn:hover{background:var(--success);color:#fff}
.apbtn:disabled{opacity:.4;cursor:not-allowed}
.apbtn.done{background:var(--success);color:#fff;border-color:var(--success);cursor:default}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.empty .ico{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>

<nav>
  <div class="logo">GB<span>Review</span>.in</div>
  <span class="abadge">ADMIN</span>
</nav>

<div class="wrap">
  <h1>Pending approvals</h1>
  <p class="sub">Businesses that have registered and are waiting for payment verification. Enter your admin password to load the list.</p>

  <div class="auth-card">
    <label for="pw-inp">Admin password</label>
    <div class="auth-row">
      <input type="password" id="pw-inp" placeholder="Enter password…" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') loadTrials()"/>
      <button onclick="loadTrials()">Load list</button>
    </div>
  </div>

  <div id="errmsg" class="errmsg"></div>
  <div id="okmsg"  class="okmsg"></div>

  <div id="trials-sec" style="display:none">
    <div class="sec-hdr">
      <h2>Pending businesses</h2>
      <span class="cnt-badge" id="cnt">0</span>
    </div>
    <div id="trials-list"></div>
  </div>
</div>

<script>
const API = "https://api.gbreview.in";
let pw = "";

async function loadTrials() {
  pw = document.getElementById("pw-inp").value;
  if (!pw) { showErr("Please enter your admin password."); return; }
  clearMsgs();

  try {
    const r = await fetch(API + "/api/trials", {
      headers: { "Authorization": "Bearer " + pw },
    });
    if (r.status === 401) { showErr("Wrong password. Try again."); return; }
    if (!r.ok) { showErr("Failed to load trials."); return; }
    const trials = await r.json();
    renderTrials(trials);
    document.getElementById("trials-sec").style.display = "block";
  } catch (e) { showErr(e.message || "Network error."); }
}

function renderTrials(trials) {
  document.getElementById("cnt").textContent = trials.length;
  const list = document.getElementById("trials-list");

  if (!trials.length) {
    list.innerHTML = '<div class="empty"><div class="ico">🎉</div><p>No pending businesses — all caught up!</p></div>';
    return;
  }

  list.innerHTML = trials.map(b => {
    const url = "https://gbreview.in/review.html?b=" + b.b;
    const ts  = new Date(b.timestamp).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" });
    return `
    <div class="bc" id="bc-${b.b}">
      <div class="btop">
        <div class="bdet">
          <div class="bname">${esc(b.businessName)}</div>
          <div class="bts">Registered on ${ts}</div>
          <div class="brow"><strong>Place ID:</strong> ${esc(b.pid)}</div>
          <div class="brow"><strong>Owner:</strong> ${esc(b.ownerName)}</div>
          <div class="brow"><strong>Contact:</strong> ${esc(b.ownerContact)}</div>
          ${b.message ? `<div class="msg-box">"${esc(b.message)}"</div>` : ""}
          <a href="${url}" target="_blank" rel="noopener" class="link-pill">🔗 ${url}</a>
          <div class="code-tag">Code: ${b.b}</div>
        </div>
        <button class="apbtn" id="ap-${b.b}" onclick="approve('${b.b}', '${esc(b.businessName)}')">
          ✓ Approve
        </button>
      </div>
    </div>`;
  }).join("");
}

async function approve(b, name) {
  const btn = document.getElementById("ap-" + b);
  btn.disabled = true;
  btn.textContent = "Approving…";
  clearMsgs();

  try {
    const r = await fetch(API + "/api/approve", {
      method  : "POST",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify({ b, password: pw }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "Approval failed");

    btn.textContent = "✓ Approved";
    btn.classList.add("done");
    showOk(`"${name}" is now live at: https://gbreview.in/review.html?b=${b}`);

    // Reload list after short delay
    setTimeout(() => loadTrials(), 1200);
  } catch (e) {
    showErr(e.message || "Approval failed.");
    btn.disabled = false;
    btn.textContent = "✓ Approve";
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = String(s || "");
  return d.innerHTML;
}
function showErr(m) { const e=document.getElementById("errmsg"); e.textContent=m; e.style.display="block"; }
function showOk(m)  { const e=document.getElementById("okmsg");  e.textContent=m; e.style.display="block"; }
function clearMsgs(){ document.getElementById("errmsg").style.display="none"; document.getElementById("okmsg").style.display="none"; }
</script>
</body>
</html>
